name: Daily Cross-Border News Fetch

on:
  schedule:
    # 每天 UTC 02:00 运行 (北京时间 10:00)
    - cron: "0 2 * * *"
  workflow_dispatch: # 允许手动触发

jobs:
  fetch-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies with uv
        run: |
          uv pip install --system -r requirements.txt

      - name: Fetch RSS feeds
        run: |
          python fetcher.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate daily report
        run: |
          python main_new.py --repo ${{ github.repository }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ BACKUP/ README.md rss.xml
          git diff --staged --quiet || git commit -m "📰 Update daily cross-border news - $(date +'%Y-%m-%d')"
          git push

name: Deploy 🍑桃子日报 to Pages

on:
  push:
    branches:
      - main
    paths:
      - main_new.py
      - fetcher.py
      - translator.py
      - classifier.py
      - requirements.txt
      - config.toml
      - static/**
      - content/**
      - .github/workflows/generate_site.yml
  workflow_run:
    workflows: ["Daily Cross-Border News Fetch"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write
    env:
      ZOLA_VERSION: v0.19.2
      BASE_URL: https://mumu731.github.io/kua-ai-daily

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: "requirements.txt"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest articles
        run: python fetcher.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Translate articles
        run: python translator.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate daily report + Zola content
        run: python main_new.py --repo ${{ github.repository }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Install Zola
        run: |
          gh release download $ZOLA_VERSION --repo getzola/zola -p '*x86_64-unknown-linux*' --output zola.tar.gz
          tar zxf zola.tar.gz && sudo mv zola /usr/local/bin
          zola --version
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Clone even theme
        run: |
          mkdir -p themes
          git clone --depth 1 https://github.com/getzola/even themes/even

      - name: Build site with Zola
        run: zola build --base-url $BASE_URL

      - name: Inject custom CSS, JS and favicon
        run: |
          CSS_HREF="${BASE_URL}/custom.css"
          ICON_HREF="${BASE_URL}/icon.png"
          JS_HREF="${BASE_URL}/custom.js"
          find public -name "*.html" -exec sed -i "s|</head>|<link rel=\"stylesheet\" href=\"${CSS_HREF}\"></head>|g" {} \;
          find public -name "*.html" -exec sed -i "s|</head>|<script defer src=\"${JS_HREF}\"></script></head>|g" {} \;
          find public -name "*.html" -exec sed -i "s|</head>|<link rel=\"icon\" type=\"image/png\" href=\"${ICON_HREF}\"><link rel=\"shortcut icon\" href=\"${ICON_HREF}\"></head>|g" {} \;

      - name: Overwrite RSS with generated feed
        run: cp rss.xml public/rss.xml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
